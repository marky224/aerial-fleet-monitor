name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel any prior in-flight run on the same branch when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint + unit tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # Python (api + pipelines)
      # ----------------------------------------------------------------
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            api/pyproject.toml
            pipelines/pyproject.toml

      - name: Install api deps
        working-directory: api
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Install pipelines deps
        working-directory: pipelines
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -e '.[dev]'

      # ----------------------------------------------------------------
      # Node (web)
      # ----------------------------------------------------------------
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web deps
        working-directory: web
        run: pnpm install --frozen-lockfile

      # ----------------------------------------------------------------
      # Lint + unit tests
      # ----------------------------------------------------------------
      - name: Lint
        run: make lint

      - name: Unit tests
        run: make test-unit
