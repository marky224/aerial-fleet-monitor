name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel any prior in-flight run on the same branch when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        # SHA-pinned to v2.3.9 (latest v2.x as of 2025-04-17) for supply-chain hardening.
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint-and-test:
    name: Lint + unit tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # Python (api + pipelines)
      # ----------------------------------------------------------------
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            api/pyproject.toml
            pipelines/pyproject.toml

      - name: Install api deps
        working-directory: api
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Install pipelines deps
        working-directory: pipelines
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -e '.[dev]'

      # ----------------------------------------------------------------
      # Lint + unit tests
      # ----------------------------------------------------------------
      - name: Lint
        run: make lint

      - name: Unit tests
        run: make test-unit
