# Aerial Fleet Monitor — docker-compose stack
#
# Phase 00 services: postgres, api, dagster (user-code/webserver/daemon).
# Public API exposure is handled out-of-stack by a host-level reverse
# tunnel; details live in `_private/docs/build/00_foundations.md`.
# Observability (Loki/Promtail/Prometheus/Grafana) lands Phase 09.
#
# Bring up with:    docker compose up -d
# Tail logs:        make logs
# Healthcheck API:  curl http://localhost:8000/v1/health

name: afm

networks:
  afm:
    name: afm

volumes:
  postgres_data:
  parquet_lake:
  dagster_home:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-afm}
      POSTGRES_USER: ${POSTGRES_USER:-afm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-afm} -d $${POSTGRES_DB:-afm}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - afm

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    env_file:
      - .env
    volumes:
      - parquet_lake:/lake
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/v1/health').status==200 else 1)\""
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - afm

  dagster-user-code:
    build:
      context: ./pipelines
      dockerfile: Dockerfile
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    env_file:
      - .env
    command: >
      dagster api grpc
      -h 0.0.0.0
      -p 4000
      -m pipelines.definitions
    volumes:
      - parquet_lake:/lake
    expose:
      - "4000"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import socket,sys; s=socket.socket(); s.settimeout(2); sys.exit(0 if s.connect_ex(('localhost',4000))==0 else 1)\""
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - afm

  dagster-webserver:
    build:
      context: ./pipelines
      dockerfile: Dockerfile
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    env_file:
      - .env
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
    command: >
      dagster-webserver
      -h 0.0.0.0
      -p 3000
      -w /opt/dagster/workspace.yaml
    volumes:
      - dagster_home:/opt/dagster/dagster_home
      - ./pipelines/workspace.yaml:/opt/dagster/workspace.yaml:ro
      - ./pipelines/dagster.yaml:/opt/dagster/dagster_home/dagster.yaml:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      dagster-user-code:
        condition: service_healthy
    networks:
      - afm

  dagster-daemon:
    build:
      context: ./pipelines
      dockerfile: Dockerfile
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    env_file:
      - .env
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
    command: >
      dagster-daemon run
      -w /opt/dagster/workspace.yaml
    volumes:
      - dagster_home:/opt/dagster/dagster_home
      - ./pipelines/workspace.yaml:/opt/dagster/workspace.yaml:ro
      - ./pipelines/dagster.yaml:/opt/dagster/dagster_home/dagster.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      dagster-user-code:
        condition: service_healthy
    networks:
      - afm
