# Aerial Fleet Monitor — docker-compose stack
#
# Phase 00 services: postgres, api, dagster (user-code/webserver/daemon).
# Public API exposure is handled out-of-stack by a host-level reverse
# tunnel; details live in `_private/docs/build/00_foundations.md`.
# Observability (Loki/Promtail/Prometheus/Grafana) lands Phase 09.
#
# Bring up with:    docker compose up -d
# Tail logs:        make logs
# Healthcheck API:  curl http://localhost:8000/v1/health

name: afm

networks:
  afm:
    name: afm

volumes:
  postgres_data:
  parquet_lake:
  dagster_home:
  prometheus_data:
  loki_data:
  grafana_data:
  promtail_positions:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-afm}
      POSTGRES_USER: ${POSTGRES_USER:-afm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-afm} -d $${POSTGRES_DB:-afm}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - afm

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    # Raised from 512m/1.0cpu/1-worker: the Flight-enrichment fanout drives
    # the local API at concurrency 8; a single uvicorn worker serialized
    # those connects and dropped them (httpx ConnectError "all connection
    # attempts failed"), which the enrichment job treats as API-down. 3
    # workers absorb the concurrent /v1/flights+/trail load; the modest
    # cpu/mem bump keeps the co-resident host tenant in mind (kept small on
    # purpose — verified empirically, tunable).
    mem_limit: 768m
    cpus: 1.5
    # Mirrors the Dockerfile CMD (keep --proxy-headers / forwarded-allow-ips
    # for the Cloudflare Tunnel) + --workers for connection concurrency.
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --proxy-headers
      --forwarded-allow-ips *
      --workers 3
    env_file:
      - .env
    environment:
      # In-stack, emit structured JSON logs so Promtail → Loki can parse
      # fields (LogQL `| json`). Local `make dev` keeps the console default.
      LOG_FORMAT: json
      # Aggregate Prometheus metrics across the 3 uvicorn workers via a shared
      # multiprocess dir (the tmpfs below — fresh on every container start, so
      # no stale per-worker metric files survive a restart).
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus_multiproc
    tmpfs:
      - /tmp/prometheus_multiproc
    volumes:
      - parquet_lake:/lake
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/v1/health').status==200 else 1)\""
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - afm

  dagster-user-code:
    build:
      context: .
      dockerfile: pipelines/Dockerfile
    restart: unless-stopped
    # Runs EVERY job (30s opensky ingest + foundry sync/reconcile/prune +
    # the flight-enrichment fanout) in one container. 512m/0.5cpu kept it
    # pegged at its memory ceiling at baseline on an 80GB/16-core host —
    # any perturbation (enrichment fanout, a redeploy) tipped it into
    # healthcheck-restarts that killed in-flight runs (and framed the
    # earlier "OOM" saga). Right-sized; the host has ample headroom and a
    # co-resident tenant is unaffected at this scale.
    mem_limit: 2g
    cpus: 2.0
    env_file:
      - .env
      # Foundry tenant creds (FOUNDRY_*) injected at runtime from their
      # gitignored single-source-of-truth file — never baked into the
      # image. pydantic-settings reads these from the container env;
      # the in-image env_file path is absent and is skipped.
      - _private/foundry/.env
    environment:
      # In-stack, the AFM API is the `api` service on the compose
      # network — NOT localhost (that's this container). Both env_files
      # carry the local-dev localhost:8000 default (correct for the
      # out-of-stack pipelines/.venv tooling), so override here; compose
      # `environment:` wins over `env_file:`. Without this every foundry
      # sync/reconcile job FoundrySyncSkips ("api unreachable").
      AFM_API_BASE: "http://api:8000"
    command: >
      dagster api grpc
      -h 0.0.0.0
      -p 4000
      -m pipelines.definitions
    volumes:
      - parquet_lake:/lake
    expose:
      - "4000"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import socket,sys; s=socket.socket(); s.settimeout(2); sys.exit(0 if s.connect_ex(('localhost',4000))==0 else 1)\""
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - afm

  dagster-webserver:
    build:
      context: .
      dockerfile: pipelines/Dockerfile
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    env_file:
      - .env
      # Foundry tenant creds (FOUNDRY_*) injected at runtime from their
      # gitignored single-source-of-truth file — never baked into the
      # image. pydantic-settings reads these from the container env;
      # the in-image env_file path is absent and is skipped.
      - _private/foundry/.env
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      # In-stack the AFM API is the `api` service, not localhost (both
      # env_files carry the local-dev localhost:8000 default). compose
      # `environment:` wins over `env_file:`; without this the foundry
      # jobs FoundrySyncSkip ("api unreachable").
      AFM_API_BASE: "http://api:8000"
    command: >
      dagster-webserver
      -h 0.0.0.0
      -p 3000
      -w /opt/dagster/workspace.yaml
    volumes:
      - dagster_home:/opt/dagster/dagster_home
      - ./pipelines/workspace.yaml:/opt/dagster/workspace.yaml:ro
      - ./pipelines/dagster.yaml:/opt/dagster/dagster_home/dagster.yaml:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      dagster-user-code:
        condition: service_healthy
    networks:
      - afm

  dagster-daemon:
    build:
      context: .
      dockerfile: pipelines/Dockerfile
    restart: unless-stopped
    # Launches runs + evaluates schedules/sensors; 0.5cpu starved it under
    # contention (gRPC UNAVAILABLE to user-code). Modest headroom bump.
    mem_limit: 1g
    cpus: 1.0
    env_file:
      - .env
      # Foundry tenant creds (FOUNDRY_*) injected at runtime from their
      # gitignored single-source-of-truth file — never baked into the
      # image. pydantic-settings reads these from the container env;
      # the in-image env_file path is absent and is skipped.
      - _private/foundry/.env
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      # In-stack the AFM API is the `api` service, not localhost (both
      # env_files carry the local-dev localhost:8000 default). compose
      # `environment:` wins over `env_file:`; without this the foundry
      # jobs FoundrySyncSkip ("api unreachable").
      AFM_API_BASE: "http://api:8000"
    command: >
      dagster-daemon run
      -w /opt/dagster/workspace.yaml
    volumes:
      - dagster_home:/opt/dagster/dagster_home
      - ./pipelines/workspace.yaml:/opt/dagster/workspace.yaml:ro
      - ./pipelines/dagster.yaml:/opt/dagster/dagster_home/dagster.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      dagster-user-code:
        condition: service_healthy
    networks:
      - afm

  # ---------------------------------------------------------------------------
  # Observability stack (Phase 09): Loki/Promtail (logs) + Prometheus (metrics)
  # + Grafana (dashboards). All localhost-bound like the rest of the stack —
  # public exposure is deliberately out of scope (AFM is local-first). Image
  # tags pinned for reproducibility; mem limits kept modest since the host
  # is shared with a co-resident tenant. No container healthchecks: the images
  # are minimal (no wget/grep), so health is verified from the host via the
  # bound ports instead.
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.2.1
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./infra/observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      - afm

  promtail:
    image: grafana/promtail:3.2.1
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./infra/observability/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/promtail
    depends_on:
      - loki
    networks:
      - afm

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=14d
      - --web.enable-lifecycle
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - afm

  grafana:
    image: grafana/grafana:11.3.1
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - afm
