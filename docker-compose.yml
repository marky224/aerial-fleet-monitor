# Aerial Fleet Monitor — docker-compose stack
#
# Phase 00 services: postgres, api, dagster (user-code/webserver/daemon).
# Public API exposure is handled out-of-stack by a host-level reverse
# tunnel; details live in `_private/docs/build/00_foundations.md`.
# Observability (Loki/Promtail/Prometheus/Grafana) lands Phase 09.
#
# Bring up with:    docker compose up -d
# Tail logs:        make logs
# Healthcheck API:  curl http://localhost:8000/v1/health

name: afm

networks:
  afm:
    name: afm

volumes:
  postgres_data:
  parquet_lake:
  dagster_home:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-afm}
      POSTGRES_USER: ${POSTGRES_USER:-afm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-afm} -d $${POSTGRES_DB:-afm}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - afm

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    # Raised from 512m/1.0cpu/1-worker: the Flight-enrichment fanout drives
    # the local API at concurrency 8; a single uvicorn worker serialized
    # those connects and dropped them (httpx ConnectError "all connection
    # attempts failed"), which the enrichment job treats as API-down. 3
    # workers absorb the concurrent /v1/flights+/trail load; the modest
    # cpu/mem bump keeps the co-resident host tenant in mind (kept small on
    # purpose — verified empirically, tunable).
    mem_limit: 768m
    cpus: 1.5
    # Mirrors the Dockerfile CMD (keep --proxy-headers / forwarded-allow-ips
    # for the Cloudflare Tunnel) + --workers for connection concurrency.
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --proxy-headers
      --forwarded-allow-ips *
      --workers 3
    env_file:
      - .env
    volumes:
      - parquet_lake:/lake
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/v1/health').status==200 else 1)\""
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - afm

  dagster-user-code:
    build:
      context: .
      dockerfile: pipelines/Dockerfile
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    env_file:
      - .env
      # Foundry tenant creds (FOUNDRY_*) injected at runtime from their
      # gitignored single-source-of-truth file — never baked into the
      # image. pydantic-settings reads these from the container env;
      # the in-image env_file path is absent and is skipped.
      - _private/foundry/.env
    environment:
      # In-stack, the AFM API is the `api` service on the compose
      # network — NOT localhost (that's this container). Both env_files
      # carry the local-dev localhost:8000 default (correct for the
      # out-of-stack pipelines/.venv tooling), so override here; compose
      # `environment:` wins over `env_file:`. Without this every foundry
      # sync/reconcile job FoundrySyncSkips ("api unreachable").
      AFM_API_BASE: "http://api:8000"
    command: >
      dagster api grpc
      -h 0.0.0.0
      -p 4000
      -m pipelines.definitions
    volumes:
      - parquet_lake:/lake
    expose:
      - "4000"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import socket,sys; s=socket.socket(); s.settimeout(2); sys.exit(0 if s.connect_ex(('localhost',4000))==0 else 1)\""
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - afm

  dagster-webserver:
    build:
      context: .
      dockerfile: pipelines/Dockerfile
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    env_file:
      - .env
      # Foundry tenant creds (FOUNDRY_*) injected at runtime from their
      # gitignored single-source-of-truth file — never baked into the
      # image. pydantic-settings reads these from the container env;
      # the in-image env_file path is absent and is skipped.
      - _private/foundry/.env
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      # In-stack the AFM API is the `api` service, not localhost (both
      # env_files carry the local-dev localhost:8000 default). compose
      # `environment:` wins over `env_file:`; without this the foundry
      # jobs FoundrySyncSkip ("api unreachable").
      AFM_API_BASE: "http://api:8000"
    command: >
      dagster-webserver
      -h 0.0.0.0
      -p 3000
      -w /opt/dagster/workspace.yaml
    volumes:
      - dagster_home:/opt/dagster/dagster_home
      - ./pipelines/workspace.yaml:/opt/dagster/workspace.yaml:ro
      - ./pipelines/dagster.yaml:/opt/dagster/dagster_home/dagster.yaml:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      dagster-user-code:
        condition: service_healthy
    networks:
      - afm

  dagster-daemon:
    build:
      context: .
      dockerfile: pipelines/Dockerfile
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    env_file:
      - .env
      # Foundry tenant creds (FOUNDRY_*) injected at runtime from their
      # gitignored single-source-of-truth file — never baked into the
      # image. pydantic-settings reads these from the container env;
      # the in-image env_file path is absent and is skipped.
      - _private/foundry/.env
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      # In-stack the AFM API is the `api` service, not localhost (both
      # env_files carry the local-dev localhost:8000 default). compose
      # `environment:` wins over `env_file:`; without this the foundry
      # jobs FoundrySyncSkip ("api unreachable").
      AFM_API_BASE: "http://api:8000"
    command: >
      dagster-daemon run
      -w /opt/dagster/workspace.yaml
    volumes:
      - dagster_home:/opt/dagster/dagster_home
      - ./pipelines/workspace.yaml:/opt/dagster/workspace.yaml:ro
      - ./pipelines/dagster.yaml:/opt/dagster/dagster_home/dagster.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      dagster-user-code:
        condition: service_healthy
    networks:
      - afm
