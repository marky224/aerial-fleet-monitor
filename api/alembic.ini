# Alembic configuration for Aerial Fleet Monitor.
#
# All schema changes are hand-written raw SQL via op.execute() to preserve
# fidelity to docs/DATA_MODEL.md. autogenerate is disabled in env.py by
# setting target_metadata=None.
#
# DATABASE_URL is resolved at runtime in env.py via app.settings.settings —
# do not put a real connection string here.

[alembic]
script_location = alembic

# Prepend api/ to sys.path so env.py can `from app.settings import settings`.
prepend_sys_path = .

# Migration filename template: <revision>_<slug>.py
# First migration is hand-named 0001_initial_schema.py; future ones default
# to hex revision IDs unless renamed by hand.
file_template = %%(rev)s_%%(slug)s

# Use UTC timestamps in generated revisions for consistency across hosts.
timezone = UTC

# sqlalchemy.url is set programmatically in env.py — leave blank here.
sqlalchemy.url =


# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
